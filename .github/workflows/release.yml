name: Continuous Delivery

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      dist_artifacts_name: dist
      dist_artifacts_dir: dist
      lock_file_artifact: uv.lock
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          fetch-tags: true

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install Python & Project dependencies
        run: uv sync --all-extras --dev

      - name: Detect next version
        id: version
        env:
          GH_TOKEN: "none"  # prevent accidental pushes
        run: uv run semantic-release -v version --no-changelog --no-commit --no-tag

      - name: Upload Distribution Artifacts
        if: ${{ steps.version.outputs.released == 'true' }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.dist_artifacts_name }}
          path: ${{ env.dist_artifacts_dir }}/**
          if-no-files-found: error
          retention-days: 2

      - name: Upload Lock File Artifact
        if: ${{ steps.version.outputs.released == 'true' }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.lock_file_artifact }}
          path: ${{ env.lock_file_artifact }}
          if-no-files-found: error
          retention-days: 2

    outputs:
      new-release-detected: ${{ steps.version.outputs.released }}
      new-release-version: ${{ steps.version.outputs.version }}
      new-release-tag: ${{ steps.version.outputs.tag }}
      distribution-artifacts: ${{ env.dist_artifacts_name }}
      lock-file-artifact: ${{ env.lock_file_artifact }}

  release:
    runs-on: ubuntu-latest
    needs:
      - build
    if: ${{ needs.build.outputs.new-release-detected == 'true' }}
    concurrency:
      group: ${{ github.workflow }}-release-${{ github.ref_name }}
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          fetch-tags: true

      - name: Force release branch to workflow SHA
        run: git reset --hard ${{ github.sha }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install Python & dependencies
        run: uv sync --all-extras --dev

      - name: Download build artifacts from build job
        uses: actions/download-artifact@v6
        with:
          name: ${{ needs.build.outputs.distribution-artifacts }}
          path: dist

      - name: Download lock file artifact
        uses: actions/download-artifact@v6
        with:
          name: ${{ needs.build.outputs.lock-file-artifact }}

      - name: Stage lock file for commit
        run: git add uv.lock

      - name: Build artifacts for release
        run: uv build

      - name: Create and publish release
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run semantic-release -v --strict version
          uv run semantic-release publish
          # Explicitly set output to allow deploy job to trigger
          echo "released=true" >> $GITHUB_OUTPUT

    outputs:
      released: ${{ steps.release.outputs.released }}
      new-release-version: ${{ steps.release.outputs.version }}
      new-release-tag: ${{ steps.release.outputs.tag }}

  deploy:
    name: Deploy to PyPI
    runs-on: ubuntu-latest
    needs:
      - release
    if: ${{ needs.release.outputs.released == 'true' }}
    environment:
      name: pypi
      url: https://pypi.org/project/smal-lang/
    permissions:
      id-token: write
    steps:
      - name: Download Distribution Artifacts
        uses: actions/download-artifact@v6
        with:
          name: ${{ needs.build.outputs.distribution-artifacts }}
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          print-hash: true
          verbose: true